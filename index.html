<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script>
      async function login() {
  const value = document.querySelector("#card").value.trim();
  const password = document.querySelector("#password").value.trim();

  // أول شيء تحقق أن كلمة المرور 4 خانات
  if (password.length !== 4) {
    alert("عزيزي المستفيد الرمز مكون من اربع خانات فقط حاول مجدداً");
    return;
  }

  try {
    const response = await fetch("users.json");
    const users = await response.json();

    // هل رقم البطاقة موجود؟
    const cardExists = users.find(item => item.card === value);

    if (!cardExists) {
      alert("عزيزي المستفيد تاكد من صحة رقم البطاقة");
      return;
    }

    // هل رقم البطاقة وكلمة المرور متطابقين؟
    const user = users.find(
      item => item.card === value && item.password === password
    );

    if (user) {
      window.location = "/account.html";
    } else {
      alert("عزيزي المستفيد تأكد من صحة كلمة المرور");
    }

  } catch (err) {
    console.error(err);
    alert("حدث خطأ أثناء تحميل بيانات المستخدمين");
  }
}
    </script>
    <title>تسجيل الدخول</title>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="image"><img src="./css/j.png" alt=" " /></div>

        <div class="form-container">
          <p class="choose">اختر نوع الدخول</p>
          <div class="tabs">
            <div>اسم المستخدم</div>
            <div>الدخول السريع</div>
          </div>

          <div class="form">
            <input
              type="text"
              placeholder="رقم البطاقة"
              id="card"
              name="card"
            />
            <input
              type="text"
              placeholder="كلمة السر"
              id="password"
              name="pssword"
            />
            <button onclick="{login()}">الدخول</button>
          </div>
          <div class="info">
            <div>
              <input type="radio" name="rem" id="rem" />
              <label for="rem">تذكرني</label>
            </div>
            <div>استعادة بيانات الدخول</div>
          </div>

          <div class="signup">
            <span class="material-symbols-outlined signup-icon">
              person_add </span
            >التسجيل
          </div>
          <div class="about">
            <p>
              بنك كين شركة مساهمة بسجل تجاري رقم RA38019711 وعنوان مقره الرئيسي
              8229 جزيرة ميران، ولاية نبل 12711 - 3952، ولاية نبل العربية وخاضع
              لإشراف ورقابة مؤسسة النقد
            </p>
          </div>

          <div class="more">المزيد</div>
        </div>
      </div>
    </main>
  </body>
</html>
